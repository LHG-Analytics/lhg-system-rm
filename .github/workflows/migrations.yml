name: Supabase Migrations → Production

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinado para evitar breaking changes de "latest"
          version: 2.84.2

      - name: Apply migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Usa link + push via Management API (HTTPS/443) em vez de conexão
          # direta ao PostgreSQL (5432) — evita erro de IPv6 no runner do GitHub.
          supabase link --project-ref pvlcktqbjianrbzpqrbd
          supabase db push
